name: Bug report
description: An installed Method behaviour does not match what's documented
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The Method ships as files (agents, skills, install script, docs) — most bugs are either:
        - An agent producing the wrong output for a documented situation
        - `install.sh` failing on a specific environment
        - Documentation that contradicts behaviour

  - type: input
    id: version
    attributes:
      label: Method version
      description: Run `cat VERSION` in your installed project, or check the version pin in your install command.
      placeholder: "v1.2.4"
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Which AI coding agent are you running?
      options:
        - Claude Code
        - Cursor
        - Codex
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the actual behaviour you saw.
    validations:
      required: true

  - type: textarea
    id: what-expected
    attributes:
      label: What you expected
      description: What did the docs lead you to expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: A short sequence — what you typed, in what context.
      placeholder: |
        1. Installed the Method in a fresh repo
        2. Ran `/plan add a bulk export endpoint`
        3. Observed ...
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Relevant `AGENTS.md` / `method.config.yaml` excerpts (redact any credentials), agent file modifications, etc.
    validations:
      required: false
